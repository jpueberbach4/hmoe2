# ==============================================================================
# GLOBAL TASK DEFINITIONS
# ==============================================================================
tasks:
  - name: task_top
    num_classes: 2
    loss_weight: 1.0
    pos_weight: 15.0
    enabled: false
    label_target: "example-pivot-finder-close-6_46_tops_2_4"

  - name: task_bot
    num_classes: 2
    loss_weight: 1.0
    pos_weight: 25.0
    label_target: "example-pivot-finder-close-6_46_bottoms_2_4"

  # The Macro Regime Task
  - name: task_bull
    num_classes: 2
    loss_weight: 1.0
    pos_weight: 1.0  # Kept at 1.0 because bull markets are roughly 50% of the data, not rare spikes
    label_target:
      name: "regime-labeler-gbpusd"

# ==============================================================================
# MIXTURE OF EXPERTS TOPOLOGY MAP 
# ==============================================================================
tree:
  name: root_router
  type: ROUTER
  gate_type: PASS_THROUGH
  children:

    # ==========================================
    # BRANCH 1: MACRO REGIME DETECTION
    # ==========================================
    - name: detect_regime
      type: ROUTER
      gate_type: PASS_THROUGH
      dilations: [1,2,3,4,5]
      children:
        - name: macro_bull_expert
          type: EXPERT
          backend: TCN
          hidden_dim: 16
          dilations: [1,2,4,8,16]
          features:
            - name: "rsi-sma-normalized_42"
            - name: "ema-distance_200_50"
              clamp: 3.5
            - name: "donchian-position_200"
            - name: "forward-panel_1d_rsi-sma-normalized_7_5"
          allowed_tasks: ["task_bull"] # This expert ONLY cares about the macro regime

    # ==========================================
    # BRANCH 2: MICRO BOTTOM DETECTION
    # ==========================================
    - name: detect_bottoms
      type: ROUTER
      gate_type: PASS_THROUGH
      noise_std: 0.0
      children:
        - name: absolute_bottom_expert_tcn
          type: EXPERT
          backend: TCN
          hidden_dim: 32
          dilations: [1,2,4,8]
          features:
            - name: forward-panel_4h_zscore_14_5
            - name: forward-panel_4h_talib-rsi_14_5
            - name: forward-panel_1d_zscore_7_5
            - name: forward-panel_1d_zscore_14_5
            - name: forward-panel_1d_zscore_50_5
            - name: forward-panel_1d_rsi-sma-normalized_7_5
            - name: forward-panel_1d_rsi-sma-normalized_14_5
            - name: forward-panel_1d_rsi-sma-normalized_28_5
            - name: forward-panel_1d_rsi-sma-normalized_42_5

          allowed_tasks: ["task_bot"]

    

