# ==============================================================================
# GLOBAL TASK DEFINITIONS
# ==============================================================================
tasks:
  # The regime task defines whether we should sell tops or buy bottoms
  - name: task_regime
    num_classes: 2
    pos_weight: 3.0
    label_target: "regime-labeler-gbpusd"

  # This learns and identifies potential tops
  - name: task_tops
    num_classes: 2
    pos_weight: 10.0
    enabled: true  # <--- ENABLED
    label_target: "example-pivot-finder-close-4_40_tops_0.005_3"

  # This learns and identifies potential bottoms
  - name: task_bottoms
    num_classes: 2
    pos_weight: 10.0
    enabled: true  # <--- ENABLED
    label_target: "example-pivot-finder-close-4_40_bottoms_0.005_3"

# ==============================================================================
# MIXTURE OF EXPERTS TOPOLOGY MAP 
# ==============================================================================
tree:
  name: root_router
  type: ROUTER
  gate_type: PASS_THROUGH
  children:

    # ==========================================
    # BRANCH 1: MACRO REGIME
    # ==========================================
    - name: detect_regime
      type: ROUTER
      gate_type: PASS_THROUGH
      noise_std: 0.0
      children:
        # The Macro Shape Detector
        - name: regime_expert
          type: EXPERT
          backend: SIGNATORY
          hidden_dim: 32
          dropout: 0.2
          depth: 3
          window_length: 80
          features:
            - name: "forward-panel_1d_rsi_14_5"
              normalize: 1
            - name: "forward-panel_1W_rsi_14_5"
              normalize: 1
          allowed_tasks: ["task_regime"]

    # ==========================================
    # BRANCH 2: MICRO BOTTOM DETECTION
    # ==========================================
    - name: detect_bottoms
      type: ROUTER
      gate_type: PASS_THROUGH
      noise_std: 0.0
      children:
        # The Micro Bottom Shape Detector
        - name: bottom_expert
          type: EXPERT
          backend: SIGNATORY
          hidden_dim: 32
          dropout: 0.2
          depth: 2
          features:
            # Tactical entries require faster timeframes
            - name: "forward-panel_4h_rsi_14_5"
              normalize: 1
            - name: "forward-panel_8h_rsi_14_5"
              normalize: 1
            - name: "forward-panel_12h_rsi_14_5"
              normalize: 1
          allowed_tasks: ["task_bottoms"]

    # ==========================================
    # BRANCH 3: MICRO TOP DETECTION
    # ==========================================
    - name: detect_tops
      type: ROUTER
      gate_type: PASS_THROUGH
      noise_std: 0.0
      children:
        # The Micro Top Shape Detector
        - name: top_expert
          type: EXPERT
          backend: SIGNATORY
          hidden_dim: 32
          dropout: 0.2
          depth: 2
          features:
            # Tactical entries require faster timeframes
            - name: "forward-panel_4h_rsi_14_5"
              normalize: 1
            - name: "forward-panel_8h_rsi_14_5"
              normalize: 1
            - name: "forward-panel_12h_rsi_14_5"
              normalize: 1
          allowed_tasks: ["task_tops"]