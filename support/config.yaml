# ==============================================================================
# GLOBAL TASK DEFINITIONS
# ==============================================================================
# This is a simple example (learns based on higher TF RSI for trend detection)
tasks:
  # The regime task defines whether we should sell tops or buy bottoms
  # When in bull-mode: buy bottoms. When in sell-mode: sell tops.
  - name: task_regime
    num_classes: 2
    pos_weight: 3.0
    # Check charts. Label bullmarket-ranges with 1.
    # Chop is hard to detect.
    label_target: "regime-labeler-gbpusd"

  # This learns and identifies potential tops
  - name: task_tops
    num_classes: 2
    pos_weight: 10.0
    enabled: false
    # This label marks pivots for tops
    label_target: "example-pivot-finder-close-6_80_tops_3_3"

  # This learns and identifies potential bottoms
  - name: task_bottoms
    num_classes: 2
    pos_weight: 10.0
    enabled: false
    # This label marks pivots for bottoms
    label_target: "example-pivot-finder-close-6_80_bottoms_3_3"

# ==============================================================================
# MIXTURE OF EXPERTS TOPOLOGY MAP 
# ==============================================================================
tree:
  name: root_router
  type: ROUTER
  gate_type: PASS_THROUGH
  children:

    # ==========================================
    # BRANCH 1: MACRO REGIME
    # ==========================================
    - name: detect_regime
      type: ROUTER
      gate_type: PASS_THROUGH
      noise_std: 0.0
      children:
        # 1. The Shape Detector (Blind to Altitude)
        - name: regime_expert
          type: EXPERT
          backend: SIGNATORY
          hidden_dim: 32
          dropout: 0.2 # Dropout is to force better generalization (gets disabled during eval)
          depth: 3
          window_length: 80
          features:
            # Have it learn to match the bull-labeller with daily and weekly RSI.
            - name: "forward-panel_1d_rsi_14_10"
              normalize: 1
            - name: "forward-panel_1W_rsi_14_10"
              normalize: 1
          allowed_tasks: ["task_regime"]

    
    

