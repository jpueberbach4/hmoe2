# ==============================================================================
# GLOBAL TASK DEFINITIONS
# ==============================================================================
# Tasks define the supervised learning objectives for the model. 
# Experts subscribe to these tasks via the 'allowed_tasks' list.
tasks:
  - name: task_regime
    num_classes: 2
    loss_weight: 1.0       # (Optional) Overall weight of this task in the total loss. Default: 1.0
    pos_weight: 3.0        # (Optional) Penalty multiplier for false negatives. Default: 1.0
    enabled: true          # (Optional) If false, the task is completely ignored. Default: true
    label_target: "regime-labeler-gbpusd" # Simple string feature assignment

  - name: task_tops
    num_classes: 2
    pos_weight: 2.0
    enabled: true
    # Feature assignment using the expanded dictionary syntax (e.g., for cheating/clamping)
    label_target:
      name: "example-pivot-finder-close-4_80_tops_0_01_5"
      clamp: 1.0
      normalize: 0
      cheat: true

  - name: task_bottoms
    num_classes: 2
    enabled: false         # Example of a disabled task


# ==============================================================================
# MIXTURE OF EXPERTS TOPOLOGY MAP 
# ==============================================================================
# The tree defines the hierarchical routing and processing structure.
tree:
  name: root_router
  type: ROUTER
  # ROUTER OPTIONS:
  # gate_type: PASS_THROUGH (parallel execution), LINEAR, TOPK, GRU, TCN
  # noise_std: Float > 0 adds noise for stochastic exploration during training
  gate_type: PASS_THROUGH
  
  children:

    # --------------------------------------------------------------------------
    # BRANCH 1: Temporal Routing (TCN Gate) & Sequence Backends
    # --------------------------------------------------------------------------
    - name: temporal_router
      type: ROUTER
      gate_type: TCN       # Uses dilated causal convolutions for routing
      noise_std: 0.1
      children:
        
        # Expert 1: Temporal Convolutional Network
        - name: expert_tcn
          type: EXPERT
          backend: TCN
          hidden_dim: 32
          allowed_tasks: ["task_regime"]
          dilations: [1, 2, 4, 8] # TCN Specific: Receptive field expansion
          dropout: 0.2
          features:
            - "forward-panel_1d_rsi_14_5"
            - "forward-panel_1W_rsi_14_5"

        # Expert 2: Causal Transformer
        - name: expert_transformer
          type: EXPERT
          backend: CAUSAL_TRANSFORMER # Aliases: TRANSFORMER, CT
          hidden_dim: 32
          allowed_tasks: ["task_regime"]
          num_layers: 2    # Transformer Specific: Number of encoder layers
          nheads: 4        # Transformer Specific: Number of attention heads
          dropout: 0.2
          features:
            - name: "price_action_data"
              normalize: 2 # 2 = Rolling Z-Score Normalization

    # --------------------------------------------------------------------------
    # BRANCH 2: Sparse Routing (Top-K Gate) & Feedforward Backends
    # --------------------------------------------------------------------------
    - name: sparse_router
      type: ROUTER
      gate_type: TOPK      # Only activates the top 'k' experts
      top_k: 1             # TOPK Specific: Number of experts to select
      noise_std: 0.2
      children:

        # Expert 3: Standard Feedforward Linear
        - name: expert_linear
          type: EXPERT
          backend: LINEAR
          hidden_dim: 32
          allowed_tasks: ["task_tops"]
          dropout: 0.2
          features:
            # Expanded feature syntax with clamping and static normalization
            - name: "forward-panel_4h_rsi_14_5"
              clamp: 100.0
              normalize: 1 # 1 = Static / 100 scale
              cheat: false

        # Expert 4: Gated Residual Network (GLU)
        - name: expert_gated_res
          type: EXPERT
          backend: GATED_RESIDUAL # Aliases: GR
          hidden_dim: 32
          allowed_tasks: ["task_tops"]
          dropout: 0.3
          features:
            - name: "forward-panel_8h_rsi_14_5"
              normalize: 1

    # --------------------------------------------------------------------------
    # BRANCH 3: Stateful Routing (GRU Gate) & Recurrent Backends
    # --------------------------------------------------------------------------
    - name: rnn_router
      type: ROUTER
      gate_type: GRU       # Uses GRU to track temporal dynamics for routing decisions
      hidden_dim: 16       # GRU Gate Specific: Size of routing hidden state
      noise_std: 0.05
      children:

        # Expert 5: Long Short-Term Memory
        - name: expert_lstm
          type: EXPERT
          backend: LSTM
          hidden_dim: 32
          allowed_tasks: ["task_regime"]
          num_layers: 2    # LSTM Specific: Stack depth
          dropout: 0.2
          features:
            - "forward-panel_12h_rsi_14_5"

        # Expert 6: Gated Recurrent Unit
        - name: expert_gru
          type: EXPERT
          backend: GRU
          hidden_dim: 32
          allowed_tasks: ["task_regime"]
          num_layers: 2    # GRU Specific: Stack depth
          dropout: 0.2
          features:
            - "forward-panel_12h_rsi_14_5"

        # Expert 7: Vanilla Elman RNN
        - name: expert_rnn
          type: EXPERT
          backend: VANILLA_RNN # Aliases: RNN
          hidden_dim: 32
          allowed_tasks: ["task_regime"]
          num_layers: 2    # RNN Specific: Stack depth
          dropout: 0.2
          features:
            - "forward-panel_12h_rsi_14_5"

    # --------------------------------------------------------------------------
    # BRANCH 4: Linear Routing & Experimental Backends
    # --------------------------------------------------------------------------
    - name: baseline_router
      type: ROUTER
      gate_type: LINEAR    # Simple stateless linear projection
      noise_std: 0.0
      children:

        # Expert 8: Rough Path Signatures
        - name: expert_signature
          type: EXPERT
          backend: SIGNATURE # Aliases: SIGNATORY, ROUGH_PATH, RP
          hidden_dim: 32
          allowed_tasks: ["task_tops", "task_regime"]
          depth: 2             # Signature Specific: Truncation depth (complexity)
          window_length: 80    # Signature Specific: Local sliding window size
          dropout: 0.2
          features:
            - "forward-panel_4h_rsi_14_5"
            - "forward-panel_1d_rsi_14_5"

        # Expert 9: Matrix Profile / Motifs (Experimental)
        - name: expert_motifs
          type: EXPERT
          backend: MATRIX_PROFILE # Aliases: MOTIF, MP
          hidden_dim: 32
          allowed_tasks: ["task_tops"]
          features:
            - "forward-panel_4h_rsi_14_5"